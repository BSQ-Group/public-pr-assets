name: sweep

on:
  schedule:
    - cron: '0 3 * * 0' # Sundays 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Drop files older than 90 days
        run: |
          set -eu
          git config user.email "actions@github.com"
          git config user.name  "pr-assets sweeper"
          cutoff=$(date -d '90 days ago' +%s)
          changed=0
          for f in $(find . -maxdepth 1 -type f -name '*.png' -printf '%f\n'); do
            mtime=$(stat -c %Y "$f")
            if [ "$mtime" -lt "$cutoff" ]; then
              git rm "$f"
              changed=1
            fi
          done
          if [ "$changed" -eq 1 ]; then
            git commit -m "sweep: drop files older than 90 days"
            git push
          fi
