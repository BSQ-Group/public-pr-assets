name: sweep

on:
  schedule:
    - cron: '0 3 * * 0' # Sundays 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete core-* branches whose latest commit is older than 90 days
        run: |
          set -eu
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'
          cutoff=$(date -d '90 days ago' +%s)
          git for-each-ref --format='%(refname:short) %(committerdate:unix)' refs/remotes/origin \
            | while read ref ts; do
                name="${ref#origin/}"
                case "$name" in
                  core-*) ;;
                  *) continue ;;
                esac
                if [ "$ts" -lt "$cutoff" ]; then
                  echo "deleting $name (committed $(date -d @$ts -u))"
                  git push origin --delete "$name" || true
                fi
              done
